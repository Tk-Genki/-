<script>
  const weekdaySelect = document.getElementById('weekdaySelect');
  const residentSelect = document.getElementById('residentSelect');
  const staffNameInput = document.getElementById('staffName');
  const memoInput = document.getElementById('memo');
  const eventButtons = document.getElementById('eventButtons');
  const selectedResidentName = document.getElementById('selectedResidentName');
  const statusText = document.getElementById('statusText');
  const lastRecordText = document.getElementById('lastRecordText');
  const statusCard = document.querySelector('.status-card');

  const STAFF_NAME_STORAGE_KEY = 'bath-app-staff-name';

  document.addEventListener('DOMContentLoaded', initializeApp);

  function initializeApp() {
    restoreStaffName();
    bindEvents();
    updateSelectedResidentDisplay();
    setStatus('読み込み中です...', 'loading');

    google.script.run
      .withSuccessHandler(renderApp)
      .withFailureHandler(showError)
      .getAppConfig();
  }

  function bindEvents() {
    staffNameInput.addEventListener('change', persistStaffName);
    residentSelect.addEventListener('change', handleResidentChange);
    weekdaySelect.addEventListener('change', handleWeekdayChange);
  }

  function renderApp(config) {
    renderWeekdayOptions(
      config && config.weekdays ? config.weekdays : [],
      config && config.defaultWeekday ? config.defaultWeekday : ''
    );
    renderResidentOptions(config && config.residents ? config.residents : [], '');
    renderEventButtons(config && config.events ? config.events : []);
    updateSelectedResidentDisplay();
    setStatus('記録するボタンを押してください', 'default');
  }

  function renderWeekdayOptions(weekdays, defaultWeekday) {
    weekdaySelect.innerHTML = '';

    weekdays.forEach((weekday) => {
      const option = document.createElement('option');
      option.value = weekday.key;
      option.textContent = weekday.label;
      if (weekday.key === defaultWeekday) {
        option.selected = true;
      }
      weekdaySelect.appendChild(option);
    });
  }

  function renderResidentOptions(residents, preferredResidentId) {
    residentSelect.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = residents.length > 0
      ? '利用者を選択してください'
      : 'この曜日に対象利用者はいません';
    residentSelect.appendChild(placeholder);

    residents.forEach((resident) => {
      const option = document.createElement('option');
      option.value = resident.id;
      option.textContent = `${resident.id} / ${resident.name}`;
      option.dataset.name = resident.name;
      residentSelect.appendChild(option);
    });

    if (preferredResidentId && residents.some((resident) => resident.id === preferredResidentId)) {
      residentSelect.value = preferredResidentId;
    } else {
      residentSelect.value = '';
    }
  }

  function renderEventButtons(events) {
    eventButtons.innerHTML = '';

    events.forEach((event) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'event-button';
      button.dataset.eventKey = event.key;
      button.dataset.eventOrder = String(event.order || '');
      button.textContent = event.label;
      button.addEventListener('click', () => handleEventClick(event));
      eventButtons.appendChild(button);
    });
  }

  function handleWeekdayChange() {
    const currentResidentId = residentSelect.value;
    updateSelectedResidentDisplay();
    setStatus('利用者一覧を更新中です...', 'loading');

    google.script.run
      .withSuccessHandler((residents) => {
        renderResidentOptions(residents || [], currentResidentId);
        updateSelectedResidentDisplay();

        if (residentSelect.value) {
          setStatus('利用者一覧を更新しました', 'success');
        } else if ((residents || []).length > 0) {
          setStatus('曜日を変更しました。利用者を選択してください', 'default');
        } else {
          setStatus('この曜日に対象利用者はいません', 'error');
        }
      })
      .withFailureHandler(showError)
      .getResidentsByWeekday(weekdaySelect.value);
  }

  function handleResidentChange() {
    updateSelectedResidentDisplay();
  }

  function handleEventClick(event) {
    const residentOption = residentSelect.options[residentSelect.selectedIndex];
    const staffName = staffNameInput.value.trim();
    const memo = memoInput.value.trim();

    if (!weekdaySelect.value) {
      setStatus('曜日を選択してください', 'error');
      weekdaySelect.focus();
      return;
    }

    if (!residentSelect.value || !residentOption) {
      setStatus('利用者を選択してください', 'error');
      residentSelect.focus();
      return;
    }

    if (!staffName) {
      setStatus('担当者名を入力してください', 'error');
      staffNameInput.focus();
      return;
    }

    const pressedAt = new Date();
    const residentName = residentOption.dataset.name || residentOption.textContent;
    const payload = {
      selectedWeekday: weekdaySelect.value,
      residentId: residentSelect.value,
      residentName: residentName,
      staffName: staffName,
      memo: memo,
      eventKey: event.key,
      eventLabel: event.label,
      eventOrder: event.order,
      recordedAt: formatDateTime(pressedAt),
      recordedAtIso: pressedAt.toISOString(),
      recordedAtEpochMs: pressedAt.getTime(),
      recordedDate: formatDate(pressedAt),
      recordedTime: formatTime(pressedAt),
      weekday: getWeekdayLabel(pressedAt),
      hour: pressedAt.getHours(),
      deviceInfo: navigator.userAgent
    };

    toggleButtons(true);
    setStatus(`${event.label} を記録中です...`, 'loading');

    google.script.run
      .withSuccessHandler((result) => {
        toggleButtons(false);

        persistStaffName();

        if (event.key === 'undress' && result.reusedSession) {
          setStatus('進行中セッションに脱衣開始を追記しました', 'success');
        } else {
          setStatus(`${event.label} を記録しました`, 'success');
        }

        lastRecordText.textContent =
          `${payload.recordedAt} / ${payload.residentId} / ${payload.staffName} / ${event.label} / ${result.sessionId}`;

        memoInput.value = '';
      })
      .withFailureHandler((error) => {
        toggleButtons(false);
        showError(error);
      })
      .saveBathRecord(payload);
  }

  function toggleButtons(disabled) {
    document.querySelectorAll('.event-button').forEach((button) => {
      button.disabled = disabled;
    });
  }

  function persistStaffName() {
    localStorage.setItem(STAFF_NAME_STORAGE_KEY, staffNameInput.value.trim());
  }

  function restoreStaffName() {
    const savedName = localStorage.getItem(STAFF_NAME_STORAGE_KEY);
    if (savedName) {
      staffNameInput.value = savedName;
    }
  }

  function updateSelectedResidentDisplay() {
    const option = residentSelect.options[residentSelect.selectedIndex];

    if (!residentSelect.value || !option) {
      selectedResidentName.textContent = 'まだ選択されていません';
      return;
    }

    const residentName = option.dataset.name || option.textContent;
    selectedResidentName.textContent = `${residentName} (${residentSelect.value})`;
  }

  function setStatus(message, type) {
    statusText.textContent = message;
    statusCard.dataset.statusType = type || 'default';
  }

  function showError(error) {
    const message = error && error.message ? error.message : 'エラーが発生しました';
    setStatus(message, 'error');
  }

  function formatDateTime(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hour = String(date.getHours()).padStart(2, '0');
    const minute = String(date.getMinutes()).padStart(2, '0');
    const second = String(date.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
  }

  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function formatTime(date) {
    const hour = String(date.getHours()).padStart(2, '0');
    const minute = String(date.getMinutes()).padStart(2, '0');
    const second = String(date.getSeconds()).padStart(2, '0');
    return `${hour}:${minute}:${second}`;
  }

  function getWeekdayLabel(date) {
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    return weekdays[date.getDay()];
  }
</script>
